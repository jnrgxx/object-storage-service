spring.application.name=object-storage-service-api

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/object_storage_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Storage Configuration ( where uploaded files will be stored on disk)
storage.upload-dir=./uploads